# =============================================================================
#  CI/CD pipeline for spring-petclinic (Spring Boot + Maven)
#  Save this file in your fork at:  .github/workflows/ci.yml
#  It runs automatically on every push and pull request to the main branch.
#
#  WEEK 1 GOAL: get this green. Build -> Test -> Package -> upload the .jar.
#  (Week 2 adds publishing to an artifact repo - see the commented block below.)
# =============================================================================

name: CI Pipeline                 # Shows up under the "Actions" tab in GitHub

# --- WHEN should this pipeline run? ------------------------------------------
on:
  push:
    branches: [ "main" ]          # run when code is pushed to main
  pull_request:
    branches: [ "main" ]          # run when a PR targets main
  workflow_dispatch:              # also lets you run it manually from the UI

# --- WHAT should it do? ------------------------------------------------------
jobs:
  build:
    name: Build, test and package
    runs-on: ubuntu-latest        # GitHub gives you a free Linux machine

    steps:
      # 1. Grab your source code onto the build machine
      - name: Check out the code
        uses: actions/checkout@v4

      # 2. Install Java 17 (the version spring-petclinic needs) + cache Maven
      #    The cache makes later runs much faster.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # 3. Build + run the tests. './mvnw' is the Maven wrapper that ships
      #    inside the petclinic repo, so you don't need Maven pre-installed.
      #    'verify' = compile, run unit + integration tests, and package.
      - name: Build and test
        run: ./mvnw --batch-mode verify

      # 4. Save the produced .jar so you can download it from the run page.
      #    This is your simple "deploy" for Week 1 - the artifact is stored
      #    in GitHub for 30 days. (Week 2 replaces this with a real repo.)
      - name: Upload the .jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: petclinic-jar
          path: target/*.jar
          if-no-files-found: error   # fail loudly if packaging didn't produce a jar

